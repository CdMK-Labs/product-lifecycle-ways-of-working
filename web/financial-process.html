<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/fonts.css">
  <title>Financial Process – Product Lifecycle</title>
  <link rel="stylesheet" href="css/stage.css">
  <style>
    .financial-stages-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .financial-stage-block {
      background: #fff;
      border: 1px solid #ddeedd;
      border-top: 3px solid #0D6A4B;
      border-radius: 4px;
      padding: 0.85rem 0.9rem;
    }

    .financial-stage-block .card-number {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #82CE71;
      margin-bottom: 0.15rem;
    }

    .financial-stage-block h3 {
      font-size: 0.88rem;
      font-weight: 700;
      color: #02462F;
      margin-bottom: 0.25rem;
      line-height: 1.3;
      text-transform: none;
      letter-spacing: normal;
      opacity: 1;
    }

    .financial-stage-block p {
      font-size: 0.85rem;
      color: #4a6a5a;
      line-height: 1.55;
      margin: 0;
    }

    @media (max-width: 800px) {
      .financial-stages-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 480px) {
      .financial-stages-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="accent-bar" id="accent-bar"></div>
  <nav class="stage-nav" aria-label="Site navigation">
    <div class="nav-inner">
      <a href="financial-model.html" class="nav-btn nav-home">&larr; Financial Model</a>
    </div>
  </nav>
  <div class="page-body">
    <h1 id="process-title"></h1>
    <div id="process-content" class="stage-content"></div>
  </div>
  <script src="js/marked.min.js"></script>
  <script src="js/financial-process.js"></script>
</body>
</html>
